name: static-site

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify sitemap generator idempotence
        run: |
          python scripts/build-sitemap.py
          cp sitemap.xml /tmp/sitemap-first.xml
          cp sitemap_index.xml /tmp/sitemap-index-first.xml
          python scripts/build-sitemap.py
          cmp /tmp/sitemap-first.xml sitemap.xml
          cmp /tmp/sitemap-index-first.xml sitemap_index.xml
      - name: Parse site tooling
        run: python -m compileall -q scripts
      - name: Validate public output
        run: python scripts/validate-static-site.py
